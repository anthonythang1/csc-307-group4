spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
server.address=0.0.0.0
server.port=${PORT:8080}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

### DB variables + .env ###
spring.datasource.url=${DB_URL:${SUPABASE_DB_URL:}}
spring.datasource.username=${DB_USER:${SUPABASE_DB_USER:}}
spring.datasource.password=${DB_PASSWORD:${SUPABASE_DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.datasource.hikari.data-source-properties.sslmode=require

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.supabase.audience=${SUPABASE_JWT_AUDIENCE:authenticated}
app.supabase.issuer=${SUPABASE_JWT_ISSUER:}
app.supabase.jwt-secret=${SUPABASE_JWT_SECRET:}
app.supabase.db-url=${SUPABASE_DB_URL:${spring.datasource.url}}
app.supabase.db-user=${SUPABASE_DB_USER:${spring.datasource.username}}
app.supabase.db-password=${SUPABASE_DB_PASSWORD:${spring.datasource.password}}
app.landlord.default-business-id=${DEFAULT_LANDLORD_BUSINESS_ID:0}
