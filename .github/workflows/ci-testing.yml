name: CI Testing

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: cd packages/react-ts-frontend && npm run test
      - run: cd packages/react-ts-frontend && npm run lint
      - run: cd packages/react-ts-frontend && npm run build
